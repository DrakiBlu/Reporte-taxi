name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Java 21 (requerido por compileSdk 36)
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Instalar dependencias npm
      - name: Instalar dependencias
        run: npm ci

      # 5. Sincronizar Capacitor con Android
      - name: Sincronizar Capacitor
        run: npx cap sync android

      # 6. Dar permisos y arreglar line endings del Gradle wrapper
      - name: Preparar Gradle wrapper
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      # 7. Compilar APK debug
      - name: Compilar APK debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # 8. Subir el APK como artefacto descargable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: reporte-taxi-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
